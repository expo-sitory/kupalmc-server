race:
  stamina-mode: hp-based
  stamina-hp-multiplier: 5
  
  collision:
    enabled: true
    damage: 1                    
    cooldown-ticks: 0
    range: 2.5
    knockback-force: 1.0
    separation-distance: 2.5
  
  block-contact:
    damage: 1.0                    
    stamina-drain: 20        
    cooldown-ms: 1000               
    damage-blocks:
      - PALE_OAK_LOG
      - STRIPPED_PALE_OAK_LOG
  
  initial-slowness: 5
  
  stamina-depletion:
    pace-5: 0.0
    pace-4: 0.005
    pace-3: 0.008
    pace-2: 0.09
    pace-1: 0.2
    pace-0: 0.5
  
  pace-slowness:
    pace-5: 6
    pace-4: 4
    pace-3: 3
    pace-2: 2
    pace-1: 1
    pace-0: 0
  
  pace-minigame:
    pace-5: 
      minigame-1:
        enabled: false
        stamina-reward: 0-0
      minigame-2:
        enabled: false
        stamina-reward: 0-0
    pace-4:
      minigame-1:
        enabled: true
        stamina-reward: 20-50
      minigame-2:
        enabled: true
        stamina-reward: 20-50
    pace-3:
      minigame-1:
        enabled: true
        stamina-reward: 20-50
      minigame-2:
        enabled: true
        stamina-reward: 20-50
    pace-2:
      minigame-1:
        enabled: true
        stamina-reward: 20-50
      minigame-2:
        enabled: true
        stamina-reward: 20-50
    pace-1:
      minigame-1:
        enabled: true
        stamina-reward: 20-50
      minigame-2:
        enabled: true
        stamina-reward: 20-50
    pace-0:
      minigame-1:
        enabled: false
        stamina-reward: 0-0
      minigame-2:
        enabled: false
        stamina-reward: 0-0
  
  emergency-slowness-amplifier: 4
  emergency-stamina-threshold: 20
  recovery-stamina-threshold: 50
  
  stamina-ranges:
    0-10:
      regen: 5.0
      slowness-amplifier: 5
    
    10-20:
      regen: 2.5
      slowness-amplifier: 0
    
    20-30:
      regen: 1.5
      slowness-amplifier: 0
 
    30-40:
      regen: 0.5
      slowness-amplifier: 0
    
    40-50:
      regen: 0.0
      slowness-amplifier: 0

    50-100:
      regen: 0.0
      slowness-amplifier: 0

minigame:
  random-interval-min: 120
  random-interval-max: 240
  cooldown-between: 25
  
  game1:
    perfect-jumps-required-min: 2
    perfect-jumps-required-max: 5
    stamina-reward: 20
    duration-seconds: 8
    stamina-penalty: 60
  
  game2:
    timer-duration-seconds: 5
    stamina-reward: 40
    hit-tolerance-seconds: 0.5
    stamina-penalty: 80
  
  minigame-dash:
    distance-blocks: 3
    speed-multiplier: 2.0
    duration-ticks: 20
    bonus-stamina: 0
